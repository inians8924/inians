<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诺贝尔文学奖 - 名言</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">诺贝尔文学奖</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="history.html">历史</a>
                <a href="winners.html">获奖者</a>
                <a href="quotes.html" class="active">名言</a>
                <a href="test.html">测试</a>
                <a href="news.html">新闻</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <div id="loading-skeleton" style="display: block;">
        <div class="container">
            <div class="skeleton" style="height: 48px; width: 30%; margin: 0 auto 10px;"></div>
            <div class="skeleton" style="height: 20px; width: 40%; margin: 0 auto 50px;"></div>
            <div class="card skeleton-card" style="text-align: center;"><div class="skeleton" style="height: 120px; width: 80%; margin: 0 auto;"></div><div class="skeleton" style="height: 40px; width: 60%; margin: 20px auto;"></div></div>
            <div class="card skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="container">
            <img src="每页动态蝴蝶效果.png" class="page-decor butterfly-top-left" alt="butterfly">
            <img src="每页动态蝴蝶效果.png" class="page-decor butterfly-bottom-right" alt="butterfly">
            <h1 class="page-title">名家名言</h1>
            <p class="page-subtitle">品读诺贝尔文学奖得主的智慧之语</p>

            <div class="quote-showcase" id="captureArea">
                <div class="quote-mark">"</div>
                <div class="quote-text" id="quoteTxt"></div>
                <div class="quote-author" id="quoteAuth"></div>
                <div class="quote-mark-right">"</div>
                <div class="quote-actions">
                    <button class="btn btn-red" id="btnRandom">换一换</button>
                    <button class="btn btn-export" id="btnExport">导出图片</button>
                </div>
            </div>

            <div class="section">
                <h3 class="section-title">更多名言</h3>
                <div class="ticket-grid" id="allQuotesGrid">
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p class="footer-text">© 2026 诺贝尔文学奖介绍 | ecnu-inian</p>
    </div>

    <button class="back-top-btn" id="backTopBtn">▲</button>

    <script src="script.js"></script>
    <script>
        const quoteTxt = document.getElementById('quoteTxt');
        const quoteAuth = document.getElementById('quoteAuth');
        const captureArea = document.getElementById('captureArea');
        const allQuotesGrid = document.getElementById('allQuotesGrid');

        function displayQuote(quote) {
            quoteTxt.textContent = quote.text;
            quoteAuth.textContent = `${quote.authorName} · ${quote.book}`;
        }

        function randomQuote() {
            const idx = Math.floor(Math.random() * quoteList.length);
            displayQuote(quoteList[idx]);
        }

        function exportImage() {
            const tempContainer = document.createElement('div');
            tempContainer.style.cssText = 'position: fixed; top: -9999px; left: -9999px; width: 800px; height: 600px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #f5f0e8 0%, #ebe4d5 100%);';
            
            const topBorder = document.createElement('div');
            topBorder.style.cssText = 'position: absolute; top: 0; left: 0; right: 0; height: 30px; background: linear-gradient(to right, #722F37 0%, #8B3A3A 50%, #722F37 100%);';
            
            const bottomBorder = document.createElement('div');
            bottomBorder.style.cssText = 'position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(to right, #722F37 0%, #8B3A3A 50%, #722F37 100%);';
            
            const tempQuote = document.createElement('div');
            tempQuote.textContent = '"' + quoteTxt.textContent + '"';
            tempQuote.style.cssText = 'font-size: 28px; line-height: 2; color: #3d3d3d; margin-bottom: 30px; padding: 0 60px; position: relative; z-index: 2; max-width: 700px; text-align: center; font-family: "Huiwen-MinchoGBK", "STKaiti", "KaiTi", serif; font-style: italic;';
            
            const tempAuthor = document.createElement('div');
            tempAuthor.textContent = quoteAuth.textContent;
            tempAuthor.style.cssText = 'font-size: 20px; color: #722F37; text-align: right; position: relative; z-index: 2; font-family: "Huiwen-MinchoGBK", "STKaiti", "KaiTi", serif;';
            
            tempContainer.appendChild(topBorder);
            tempContainer.appendChild(bottomBorder);
            tempContainer.appendChild(tempQuote);
            tempContainer.appendChild(tempAuthor);
            
            document.body.appendChild(tempContainer);
            
            html2canvas(tempContainer, {
                backgroundColor: null,
                scale: 2,
                useCORS: false,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '诺贝尔文学名言.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                document.body.removeChild(tempContainer);
            }).catch(err => {
                document.body.removeChild(tempContainer);
                alert('导出图片失败，请重试！');
                console.error(err);
            });
        }

        function init() {
            randomQuote();

            quoteList.forEach((quote, index) => {
                const card = document.createElement('div');
                card.className = 'ticket-card';
                card.innerHTML = `
                    <div class="ticket-content">
                        <p class="ticket-quote">"${quote.text}"</p>
                        <div class="ticket-footer">
                            <span class="ticket-author">${quote.authorName}</span>
                            <span class="ticket-book">${quote.book}</span>
                        </div>
                    </div>
                `;
                allQuotesGrid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loading-skeleton').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                init();
                document.getElementById('btnRandom').addEventListener('click', randomQuote);
                document.getElementById('btnExport').addEventListener('click', exportImage);
            }, 600);
            initMusic();
        });

        const backTopBtn = document.getElementById('backTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) {
                backTopBtn.classList.add('show');
            } else {
                backTopBtn.classList.remove('show');
            }
        });
        backTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
