<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诺贝尔文学奖 - 获奖者</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">诺贝尔文学奖</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="history.html">历史</a>
                <a href="winners.html" class="active">获奖者</a>
                <a href="quotes.html">名言</a>
                <a href="test.html">测试</a>
                <a href="news.html">新闻</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <div id="loading-skeleton" style="display: block;">
        <div class="container">
            <div class="skeleton" style="height: 48px; width: 25%; margin: 0 auto 10px;"></div>
            <div class="skeleton" style="height: 20px; width: 40%; margin: 0 auto 50px;"></div>
            <div class="card skeleton-card" style="text-align: center;"><div class="skeleton skeleton-title" style="width: 50%; margin: 0 auto;"></div><div class="skeleton" style="height: 40px; width: 80%; margin: 15px auto;"></div></div>
            <div class="card skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="container page-container">
            <img src="每页动态蝴蝶效果.png" class="page-decor butterfly-top-left" alt="butterfly">
            <img src="每页动态蝴蝶效果.png" class="page-decor butterfly-bottom-right" alt="butterfly">
            <h1 class="page-title">获奖者</h1>
            <p class="page-subtitle">2015-2025年诺贝尔文学奖得主</p>

            <div class="card breathing">
                <h3 class="card-title" style="text-align: center;">选择年份</h3>
                <div class="year-wrap" style="display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap;">
                    <div class="year-container" id="yearContainer" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                    </div>
                </div>
            </div>

            <div class="winner-profile-card" id="winnerCard">
                <div class="profile-photo-section">
                    <img id="winnerImage" src="" alt="获奖者照片" class="profile-photo">
                    <div class="profile-year" id="displayYear"></div>
                </div>
                <div class="profile-info-section">
                    <div class="profile-name-row">
                        <h2 id="name" class="profile-name"></h2>
                        <div class="profile-tag">诺贝尔文学奖得主</div>
                    </div>
                    <div class="profile-details">
                        <div class="detail-item">
                            <span class="detail-label">国籍</span>
                            <span id="nation" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">代表作品</span>
                            <span id="works" class="detail-value"></span>
                        </div>
                    </div>
                    <div class="profile-divider"></div>
                    <div class="profile-bio">
                        <h4>简介</h4>
                        <p id="bio"></p>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3 class="section-title">历年获奖者一览</h3>
                <div class="winners-grid" id="allWinnersGrid">
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p class="footer-text">© 2026 诺贝尔文学奖介绍 | ecnu-inian</p>
    </div>

    <button class="back-top-btn" id="backTopBtn">▲</button>

    <script src="script.js"></script>
    <script>
        const nameDom = document.getElementById('name');
        const nationDom = document.getElementById('nation');
        const worksDom = document.getElementById('works');
        const bioDom = document.getElementById('bio');
        const displayYearDom = document.getElementById('displayYear');
        const winnerImageDom = document.getElementById('winnerImage');
        const yearContainer = document.getElementById('yearContainer');
        const allWinnersGrid = document.getElementById('allWinnersGrid');
        
        const imageExtensions = {
            '2015': 'webp',
            '2016': 'webp',
            '2017': 'webp',
            '2018': 'webp',
            '2019': 'webp',
            '2020': 'webp',
            '2021': 'png',
            '2022': 'webp',
            '2023': 'webp',
            '2024': 'webp',
            '2025': 'webp'
        };
        
        const imagePositions = {
            '2015': 'top center',
            '2017': 'center 30%',
            '2021': 'top center',
            '2022': 'center 25%',
            '2025': 'top center'
        };

        function createYearButton(year) {
            const btn = document.createElement('button');
            btn.className = 'year-btn';
            btn.textContent = year;
            btn.style = `
                padding: 12px 24px;
                background: rgba(114,47,55,0.2);
                backdrop-filter: blur(10px);
                color: #722F37;
                border: 1px solid rgba(114,47,55,0.4);
                border-radius: 25px;
                font-size: 16px;
                cursor: pointer;
                transition: all 0.3s;
                box-shadow: 0 4px 15px rgba(114,47,55,0.15);
            `;
            btn.onmouseover = () => {
                btn.style.transform = 'scale(1.08)';
                btn.style.boxShadow = '0 6px 20px rgba(114,47,55,0.3)';
                btn.style.background = 'rgba(114,47,55,0.3)';
            };
            btn.onmouseout = () => {
                btn.style.transform = 'scale(1)';
                btn.style.boxShadow = '0 4px 15px rgba(114,47,55,0.15)';
                btn.style.background = 'rgba(114,47,55,0.2)';
            };
            btn.addEventListener('click', () => {
                document.querySelectorAll('.year-btn').forEach(b => {
                    b.style.background = 'rgba(114,47,55,0.2)';
                    b.style.color = '#722F37';
                    b.style.borderColor = 'rgba(114,47,55,0.4)';
                });
                btn.style.background = 'rgba(255,215,0,0.2)';
                btn.style.color = '#c4a35a';
                btn.style.borderColor = 'rgba(196,163,90,0.6)';
                loadWinnerData(year);
            });
            return btn;
        }

        function loadWinnerData(year) {
            const data = prizeData[year];
            if (data) {
                const searchUrl = formatSearchUrl(data.searchName);
                nameDom.innerHTML = `<a href="${searchUrl}" target="_blank">${data.name}</a>`;
                nationDom.textContent = data.nation;
                worksDom.textContent = data.works;
                bioDom.textContent = data.bio || '暂无详细简介';
                displayYearDom.textContent = `${year}年`;
                const ext = imageExtensions[year] || 'webp';
                winnerImageDom.src = `${year}.${ext}`;
                winnerImageDom.style.objectPosition = imagePositions[year] || 'center';
                winnerCard.style.opacity = '0';
                setTimeout(() => {
                    winnerCard.style.opacity = '1';
                }, 100);
            }
        }

        function init() {
            const years = getYears();
            years.forEach(year => {
                yearContainer.appendChild(createYearButton(year));
            });

            years.forEach(year => {
                const data = prizeData[year];
                const card = document.createElement('div');
                card.className = 'mini-profile-card';
                card.style.cursor = 'pointer';
                card.onclick = () => {
                    loadWinnerData(year);
                    document.querySelectorAll('.year-btn').forEach(b => {
                        b.style.background = 'rgba(114,47,55,0.2)';
                        b.style.color = '#722F37';
                        b.style.borderColor = 'rgba(114,47,55,0.4)';
                        if (b.textContent === year) {
                            b.style.background = 'rgba(255,215,0,0.2)';
                            b.style.color = '#c4a35a';
                            b.style.borderColor = 'rgba(196,163,90,0.6)';
                        }
                    });
                };
                const ext = imageExtensions[year] || 'webp';
                const pos = imagePositions[year] || 'center';
                card.innerHTML = `
                    <div class="mini-profile-year">${year}</div>
                    <img src="${year}.${ext}" alt="${data.name}" class="mini-profile-photo" style="object-position: ${pos};">
                    <div class="mini-profile-info">
                        <h4>${data.name}</h4>
                        <p class="mini-profile-nation">${data.nation}</p>
                        <p class="mini-profile-works">${data.works.slice(0, 25)}...</p>
                    </div>
                `;
                allWinnersGrid.appendChild(card);
            });

            loadWinnerData("2015");
            document.querySelector('.year-btn').style.background = 'rgba(196,163,90,0.2)';
            document.querySelector('.year-btn').style.color = '#c4a35a';
            document.querySelector('.year-btn').style.borderColor = 'rgba(196,163,90,0.6)';
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loading-skeleton').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 600);
            init();
            initMusic();
        });

        const backTopBtn = document.getElementById('backTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) {
                backTopBtn.classList.add('show');
            } else {
                backTopBtn.classList.remove('show');
            }
        });
        backTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
