<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诺贝尔文学奖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">诺贝尔文学奖</a>
            <div class="nav-links">
                <a href="index.html" class="active">首页</a>
                <a href="history.html">历史</a>
                <a href="winners.html">获奖者</a>
                <a href="quotes.html">名言</a>
                <a href="test.html">测试</a>
                <a href="news.html">新闻</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero-section" style="text-align: center; padding: 60px 20px; position: relative;">
            <img src="每页动态蝴蝶效果.png" class="hero-decor butterfly-left" alt="butterfly">
            <img src="每页动态蝴蝶效果.png" class="hero-decor butterfly-right" alt="butterfly">
            <h1 class="hero-title">诺贝尔文学奖</h1>
            <p class="hero-subtitle">Nobel Prize in Literature</p>
            <p class="hero-year" style="font-size: 18px; color: #8B3A3A; margin-top: 10px;">2015 ~ 2025</p>
            <img src="1.png" class="nobel-medal" alt="Nobel Medal">
        </div>

        <div class="carousel-container" style="margin-top: 60px;">
            <button class="carousel-arrow carousel-prev" onclick="prevCard()">‹</button>
            <div class="carousel-track" id="carouselTrack">
                <div class="carousel-card" onclick="location.href='history.html'" data-index="0">
                    <div class="card-bg" style="background: linear-gradient(135deg, rgba(114,47,55,0.15), rgba(139,58,58,0.08));"></div>
                    <div class="card-content">
                        <div class="card-number">01</div>
                        <h3 class="card-title">历史沿革</h3>
                    </div>
                </div>
                <div class="carousel-card" onclick="location.href='winners.html'" data-index="1">
                    <div class="card-bg" style="background: linear-gradient(135deg, rgba(139,90,43,0.15), rgba(160,82,45,0.08));"></div>
                    <div class="card-content">
                        <div class="card-number">02</div>
                        <h3 class="card-title">获奖者</h3>
                    </div>
                </div>
                <div class="carousel-card" onclick="location.href='quotes.html'" data-index="2">
                    <div class="card-bg" style="background: linear-gradient(135deg, rgba(43,139,95,0.15), rgba(52,168,83,0.08));"></div>
                    <div class="card-content">
                        <div class="card-number">03</div>
                        <h3 class="card-title">名家名言</h3>
                    </div>
                </div>
                <div class="carousel-card" onclick="location.href='test.html'" data-index="3">
                    <div class="card-bg" style="background: linear-gradient(135deg, rgba(43,98,139,0.15), rgba(41,128,185,0.08));"></div>
                    <div class="card-content">
                        <div class="card-number">04</div>
                        <h3 class="card-title">趣味测试</h3>
                    </div>
                </div>
                <div class="carousel-card" onclick="location.href='news.html'" data-index="4">
                    <div class="card-bg" style="background: linear-gradient(135deg, rgba(139,139,43,0.15), rgba(142,68,173,0.08));"></div>
                    <div class="card-content">
                        <div class="card-number">05</div>
                        <h3 class="card-title">新闻报道</h3>
                    </div>
                </div>
                <div class="carousel-card" onclick="location.href='about.html'" data-index="5">
                    <div class="card-bg" style="background: linear-gradient(135deg, rgba(98,43,139,0.15), rgba(126,87,194,0.08));"></div>
                    <div class="card-content">
                        <div class="card-number">06</div>
                        <h3 class="card-title">关于网站</h3>
                    </div>
                </div>
            </div>
            <button class="carousel-arrow carousel-next" onclick="nextCard()">›</button>
        </div>
    </div>

    <div class="footer">
        <p class="footer-text">© 2026 诺贝尔文学奖介绍 | ecnu-inian</p>
    </div>

    <button class="back-top-btn" id="backTopBtn">↑</button>

    <script src="script.js"></script>
    <script>
        const backTopBtn = document.getElementById('backTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) {
                backTopBtn.classList.add('show');
            } else {
                backTopBtn.classList.remove('show');
            }
        });
        backTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        const cards = document.querySelectorAll('.carousel-card');
        const totalCards = cards.length;
        let currentIndex = 3;

        function updateCardPositions() {
            cards.forEach((card, index) => {
                let newIndex = (index - currentIndex + totalCards) % totalCards;
                card.setAttribute('data-index', newIndex);
            });
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % totalCards;
            updateCardPositions();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + totalCards) % totalCards;
            updateCardPositions();
        }

        updateCardPositions();

        initMusic();
    </script>
</body>
</html>
